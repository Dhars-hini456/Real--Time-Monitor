{% extends "base.html" %}
{% block title %}Register - Online Certificate Portal{% endblock %}
{% block content %}
<div class="container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-plus fa-2x" style="color: var(--gov-blue);"></i>
            <h3 class="mt-2">Citizen Registration</h3>
            <p class="text-muted small">Create your account to apply for certificates online</p>
        </div>
        <form method="POST" id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="full_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address *</label>
                <input type="email" class="form-control" name="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" name="phone" pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" name="address" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Password *</label>
                <input type="password" class="form-control" id="password" name="password" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password *</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-gov-primary w-100"><i class="fa-solid fa-user-plus"></i> Register</button>
        </form>
        <p class="text-center mt-3 small">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
