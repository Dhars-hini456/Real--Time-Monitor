{% extends "base.html" %}
{% block title %}Citizen Login - Online Certificate Portal{% endblock %}
{% block content %}
<div class="container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user fa-2x" style="color: var(--gov-blue);"></i>
            <h3 class="mt-2">Citizen Login</h3>
            <p class="text-muted small">Access your dashboard to apply and track certificates</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-gov-primary w-100"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </form>
        <p class="text-center mt-3 small">New citizen? <a href="{{ url_for('register') }}">Register here</a></p>
        <hr>
        <p class="text-center small mb-1"><a href="{{ url_for('officer_login') }}">Revenue Officer Login</a></p>
        <p class="text-center small"><a href="{{ url_for('admin_login') }}">Administrator Login</a></p>
    </div>
</div>
{% endblock %}
