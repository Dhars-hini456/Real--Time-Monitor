{% extends "base.html" %}
{% block title %}Officer Login - Online Certificate Portal{% endblock %}
{% block content %}
<div class="container">
    <div class="auth-card" style="border-top-color: var(--gov-green);">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-tie fa-2x" style="color: var(--gov-green);"></i>
            <h3 class="mt-2">Revenue Officer Login</h3>
            <p class="text-muted small">Review, approve or reject citizen applications</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn w-100" style="background: var(--gov-green); color: #fff; font-weight:600;"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </form>
        <p class="text-center small text-muted mt-3">Default demo credentials: officer@revenue.gov.in / officer123</p>
        <hr>
        <p class="text-center small mb-0"><a href="{{ url_for('login') }}">Back to Citizen Login</a></p>
    </div>
</div>
{% endblock %}
