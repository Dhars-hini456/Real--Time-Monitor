{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <i class="fa-solid fa-triangle-exclamation" style="font-size: 80px; color: var(--gov-saffron);"></i>
    <h2 class="mt-3">{{ message or 'Page Not Found (404)' }}</h2>
    <p class="text-muted">The page you are looking for does not exist or you do not have permission to view it.</p>
    <a href="{{ url_for('index') }}" class="btn btn-gov-primary mt-3"><i class="fa-solid fa-house"></i> Back to Home</a>
</div>
{% endblock %}
