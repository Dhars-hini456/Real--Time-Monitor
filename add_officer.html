{% extends "base.html" %}
{% block title %}Add Revenue Officer{% endblock %}
{% block content %}
<div class="container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-tie fa-2x" style="color: var(--gov-blue);"></i>
            <h3 class="mt-2">Add Revenue Officer</h3>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="full_name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address *</label>
                <input type="email" class="form-control" name="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" name="phone">
            </div>
            <div class="mb-3">
                <label class="form-label">Password *</label>
                <input type="password" class="form-control" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-gov-primary w-100"><i class="fa-solid fa-user-plus"></i> Create Officer Account</button>
        </form>
        <p class="text-center mt-3 small"><a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a></p>
    </div>
</div>
{% endblock %}
